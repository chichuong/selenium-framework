name: Selenium Test Suite
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Cho phép bấm nút chạy thủ công

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Chrome fail không dừng Firefox
      matrix:
        browser: [chrome, firefox] # Tạo 2 job chạy song song
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Cài Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # Cache để lần sau build nhanh hơn
          
      - name: Chạy Selenium Tests (${{ matrix.browser }})
        working-directory: ./bai6
        run: mvn clean test -Dbrowser=${{ matrix.browser }} -Denv=dev -Dsurefire.suiteXmlFiles=src/test/resources/testng.xml
        env:
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
          
      - name: Lưu kết quả test
        if: always() # Chạy dù test pass hay fail
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: |
            bai6/target/surefire-reports/
            bai6/target/screenshots/
          retention-days: 30
