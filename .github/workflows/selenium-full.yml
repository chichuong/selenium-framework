name: Full Selenium CI Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1-5'   # 2:00 AM Thứ 2 đến Thứ 6
  workflow_dispatch: # Cho phép bấm nút chạy thủ công

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]
      fail-fast: false # Firefox fail không dừng Chrome

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Chạy test (${{ matrix.browser }})
        working-directory: ./bai6
        run: mvn clean test -Dbrowser=${{ matrix.browser }} -Dsurefire.suiteXmlFiles=src/test/resources/testng.xml
        env:
          APP_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: bai6/target/allure-results/

  publish-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download kết quả Chrome
        uses: actions/download-artifact@v4
        with:
          name: allure-results-chrome
          path: allure-results/

      - name: Download kết quả Firefox
        uses: actions/download-artifact@v4
        with:
          name: allure-results-firefox
          path: allure-results/

      - name: Tạo và Publish Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
